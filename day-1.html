      let showing = "just_showing_up_".split('').reverse();
      for (let i = 0; i < just.length; i++) {

        just[i].style.transform = `translate(-${distance*i}px)`

        just[i].textContent = showing[i%showing.length];
        just[i].classList.add("huge", "text-center")
